<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - My Website</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    
    <style>
        body {
            background: linear-gradient(135deg, #f8f9fa, #e9ecef);
            min-height: 100vh;
        }
        /* Custom Brand Colors for Icons */
        .text-google {
            color: #de4032; 
        }
        .text-facebook {
            color: #1877f2;
        }
        /* Custom styling for the header logo img */
        .logo-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            padding: auto;
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-5">
                <div class="card shadow-lg border-0 rounded-4 p-4 p-sm-5 bg-white">
                    
                    <div class="text-center mb-4">
                        <div class="d-inline-flex align-items-center justify-content-center overflow-hidden rounded-circle mb-3 shadow-sm" style="width: 70px; height: 70px;">
                            <img src="https://i.pinimg.com/736x/23/4c/52/234c52ee1af62a701565d122f885120a.jpg" alt="Logo" class="logo-img">
                        </div>
                        <h2 class="fw-bold text-dark">Welcome Back</h2>
                        <p class="text-muted">Please enter your details to sign in</p>
                    </div>

                    <form action="index.html" method="GET" class="needs-validation" novalidate>
                        
                        <div class="form-floating mb-3">
                            <input type="email" class="form-control" id="floatingInput" placeholder="name@example.com" required>
                            <label for="floatingInput">Email address</label>
                            <div class="invalid-feedback">Please enter a valid email address.</div>
                        </div>

                        <div class="form-floating mb-3">
                            <input type="password" class="form-control" id="floatingPassword" placeholder="Password" required>
                            <label for="floatingPassword">Password</label>
                            <div class="invalid-feedback">Please enter your password.</div>
                        </div>

                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" value="" id="rememberMe">
                                <label class="form-check-label text-secondary small" for="rememberMe">
                                    Remember me
                                </label>
                            </div>
                            <a href="#" class="text-decoration-none small fw-semibold">Forgot password?</a>
                        </div>

                        <button class="btn btn-primary w-100 py-2.5 mb-3 rounded-3 fw-bold" type="submit">Sign In</button>

                        <div class="position-relative d-flex align-items-center justify-content-center my-4">
                            <hr class="w-100 text-muted">
                            <span class="position-absolute px-3 bg-white text-muted small">or continue with</span>
                        </div>

                        <div class="row g-2 mb-4">
                            <div class="col-6">
                                <button type="button" class="btn btn-outline-secondary w-100 d-flex align-items-center justify-content-center gap-2 py-2 fw-semibold">
                                    <i class="bi bi-google text-google"></i> Google
                                </button>
                            </div>
                            <div class="col-6">
                                <button type="button" class="btn btn-outline-secondary w-100 d-flex align-items-center justify-content-center gap-2 py-2 fw-semibold">
                                    <i class="fa-brands fa-facebook-f text-facebook"></i> Facebook
                                </button>
                            </div>
                        </div>

                    </form>

                    <div class="text-center">
                        <p class="text-muted mb-0 small">Don't have an account? <a href="#" class="text-decoration-none fw-semibold">Sign up</a></p>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        (() => {
            'use strict'
            const forms = document.querySelectorAll('.needs-validation')
            Array.from(forms).forEach(form => {
                form.addEventListener('submit', event => {
                    if (!form.checkValidity()) {
                        event.preventDefault()
                        event.stopPropagation()
                    }
                    form.classList.add('was-validated')
                }, false)
            })
        })()
    </script>
</body>
</html>
